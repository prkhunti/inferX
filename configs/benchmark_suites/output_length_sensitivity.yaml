# Output token count is often a stronger driver of latency than prompt length.
# This suite isolates that variable to prove the point with data.
name: output_length_sensitivity
model: gpt-4o-mini
concurrency_levels: [1]
prompt_lengths: [200]
output_lengths: [50, 100, 200, 500, 1000, 2000]
streaming: [false, true]
runs_per_case: 5
temperature: 0.0
